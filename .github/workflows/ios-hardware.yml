name: iOS Hardware Build

on:
  push:
    branches: [main, development]
    paths:
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "app/**"
      - "assets/**"
      - "components/**"
      - "hooks/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'development'
        type: choice
        options:
          - 'development'
          - 'production'
      device_id:
        description: 'Target device UDID (optional)'
        required: false
        default: '00008110-000A156A21E2801E'
      version:
        description: 'App version (x.y.z) - Production only'
        required: false
        default: ''
      build_number:
        description: 'Build number - Production only'
        required: false
        default: ''
      submit_to_appstore:
        description: 'Submit to App Store - Production only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: iOS ${{ github.event.inputs.build_type || 'development' }} Build
    runs-on: macos-latest
    environment: ${{ github.event.inputs.build_type || 'development' }}
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Setup iOS build cache
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
            
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        
      - name: Set up App Store Connect API
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          
      - name: Configure Apple Developer account
        uses: apple-actions/apple-auth@v1
        with:
          key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      
      - name: Prepare provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          if [ "${{ github.event.inputs.build_type }}" == "production" ]; then
            echo "${{ secrets.DISTRIBUTION_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision
          else
            echo "${{ secrets.DEVELOPMENT_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/development.mobileprovision
          fi
      
      - name: Install Apple certificates
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ github.event.inputs.build_type == 'production' && secrets.DISTRIBUTION_CERTIFICATES_P12 || secrets.DEVELOPMENT_CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
      
      # Production-specific version configuration
      - name: Configure version for production
        if: ${{ github.event.inputs.build_type == 'production' && github.event.inputs.version != '' && github.event.inputs.build_number != '' }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          
          # Update app.json
          jq '.expo.version = "'$VERSION'" | .expo.ios.buildNumber = "'$BUILD_NUMBER'"' app.json > app.json.tmp
          mv app.json.tmp app.json
          
          # Update Info.plist
          plutil -replace CFBundleShortVersionString -string "$VERSION" ios/SandboxPlayingFlowers/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" ios/SandboxPlayingFlowers/Info.plist
          
          echo "Set app version to $VERSION and build number to $BUILD_NUMBER"
            
      # Development build
      - name: Build for development hardware
        if: ${{ github.event.inputs.build_type != 'production' }}
        run: |
          UDID="${{ github.event.inputs.device_id }}"
          echo "Building development version for hardware device: $UDID"
          
          # Force hardware build by ensuring simulator is false
          jq '.build.development.ios.simulator = false' eas.json > eas.json.tmp
          mv eas.json.tmp eas.json
          
          # Build with EAS
          EXPO_DEBUG=true eas build --platform ios --profile development --local --non-interactive
      
      # Production build
      - name: Build for production/App Store
        if: ${{ github.event.inputs.build_type == 'production' }}
        run: |
          echo "Building production version for App Store"
          
          # Force hardware build by ensuring simulator is false
          jq '.build.production.ios.simulator = false' eas.json > eas.json.tmp
          mv eas.json.tmp eas.json
          
          # Build with EAS
          EXPO_DEBUG=true eas build --platform ios --profile production --local --non-interactive
      
      # Upload to App Store (production only)
      - name: Upload to TestFlight
        if: ${{ github.event.inputs.build_type == 'production' }}
        run: |
          # Find the built IPA file
          APP_PATH=$(find build -name "*.ipa" -type f | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .ipa file found"
            exit 1
          fi
          
          echo "Uploading $APP_PATH to TestFlight"
          xcrun altool --upload-app -f "$APP_PATH" -t ios --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      
      # Submit to App Store (only if explicitly requested)
      - name: Submit to App Store
        if: ${{ github.event.inputs.build_type == 'production' && github.event.inputs.submit_to_appstore == 'true' }}
        run: |
          # Get bundle ID
          BUNDLE_ID=$(jq -r '.expo.ios.bundleIdentifier' app.json)
          
          echo "Submitting app ($BUNDLE_ID) to App Store"
          xcrun iTMSTransporter -m submit -assetpath build/*.ipa -v eXtreme -u ${{ secrets.APPLE_ID }} -p ${{ secrets.APPLE_PASSWORD }}

      # Install on development device
      - name: Install on hardware device
        if: ${{ github.event.inputs.build_type != 'production' && github.event.inputs.device_id != '' }}
        run: |
          UDID="${{ github.event.inputs.device_id }}"
          APP_PATH=$(find build -name "*.ipa" -type f | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "No .ipa file found"
            exit 1
          fi
          
          echo "Installing on device: $UDID"
          xcrun altool --upload-app -f "$APP_PATH" -t ios --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      
      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ios-${{ github.event.inputs.build_type || 'development' }}-build
          path: |
            build/*.ipa
            build/*.app
          retention-days: 14

