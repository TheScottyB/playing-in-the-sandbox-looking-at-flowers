name: iOS Hardware Build

on:
  push:
    branches: [main, development]
    paths:
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "app/**"
      - "assets/**"
      - "components/**"
      - "hooks/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'development'
        type: choice
        options:
          - 'development'
          - 'production'
      device_id:
        description: 'Target device UDID (optional)'
        required: false
        default: '00008110-000A156A21E2801E'
      version:
        description: 'App version (x.y.z) - Production only'
        required: false
        default: ''
      build_number:
        description: 'Build number - Production only'
        required: false
        default: ''
      submit_to_appstore:
        description: 'Submit to App Store - Production only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: iOS ${{ github.event.inputs.build_type || 'development' }} Build
    runs-on: macos-latest
    environment: ${{ github.event.inputs.build_type || 'development' }}
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Install dependencies
        run: npm ci
        
      - name: Setup iOS build cache
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
            
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        
      - name: Set up App Store Connect API
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          
      - name: Configure Apple Developer account
        uses: apple-actions/apple-auth@v1
        with:
          key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

