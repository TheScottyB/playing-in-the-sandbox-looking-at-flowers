# Geolocation Fallback Smoke Test: denies location access and verifies fallback/default region loads
appId: host.exp.Exponent
---
- launchApp:
    permissions:
      location: deny
- openLink: "exp://localhost:8081"
- extendedWaitUntil:
    visible: "TAP TO READ"
    timeout: 15000
- assertVisible: "← Yesterday"
