# Geolocation Fallback Smoke Test: denies location access and verifies fallback/default region loads
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"
# Simulate denying GPS permission
- handlePermission:
    location: DENIED
- extendedWaitUntil:
    anyOf:
      - visible: "← Yesterday"
      - visible: "Coming soon to your area"
      - visible: "Default Region"
    timeout: 15000
