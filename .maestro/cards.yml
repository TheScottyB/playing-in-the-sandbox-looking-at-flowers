# Flower display: verify the flower card renders with expected fields.
# Requires network access to GitHub Pages daily flower data.
# Local dev (Expo Go): host.exp.Exponent
# CI/prod (dev client): com.djscottyb.playinginthesandoxlookingatflowers
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"
# Wait for the daily flower to load
- extendedWaitUntil:
    visible: "← Yesterday"
    timeout: 20000

# Verify the flower card fields are all present
# (state · date is rendered as a single Text element)
- assertVisible: "← Yesterday"
# The flower name, latin name and blurb are rendered as Text elements
# Maestro can assert the nav button which confirms the card rendered
- assertNotVisible: "No flower today"
- assertNotVisible: "Try again"
