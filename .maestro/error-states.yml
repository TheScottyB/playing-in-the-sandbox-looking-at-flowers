# Error state: verify the app shows recoverable errors or falls back to the
# bundled default flower when data is unavailable.
#
# The new UI falls through to getDefaultFlower() for service/network errors,
# so only 404 ("Coming soon") shows the error card. Service and network errors
# show the default flower with an "OFFLINE · ARCHIVE" badge instead.
appId: host.exp.Exponent
---
- runFlow: subflows/connect.yml

# Wait for the screen to resolve
- extendedWaitUntil:
    visible: ".*TAP TO READ.*"
    timeout: 20000

# If the 404 error state is shown, verify the retry button works
- runFlow:
    when:
      visible: "Coming soon to your area"
    commands:
      - assertVisible: "Coming soon to your area"
      - assertVisible: "Try again"
      - tapOn: "Try again"
      - extendedWaitUntil:
          visible: ".*TAP TO READ.*"
          timeout: 15000

# If the offline fallback is shown, verify the badge is present
- runFlow:
    when:
      visible: "OFFLINE"
    commands:
      - assertVisible: "OFFLINE"
