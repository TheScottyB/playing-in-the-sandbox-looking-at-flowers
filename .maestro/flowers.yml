# Error state: verify the app shows a recoverable error when data is unavailable.
# This test intentionally disconnects from the server to trigger the error path.
# Local dev (Expo Go): host.exp.Exponent
# CI/prod (dev client): com.djscottyb.playinginthesandoxlookingatflowers
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"
# Wait for the screen to resolve to any state (loading spinner disappears)
- extendedWaitUntil:
    anyOf:
      - visible: "← Yesterday"
      - visible: "No flower today"
    timeout: 20000

# If the error state is shown, verify the retry button is present
- runFlow:
    when:
      visible: "No flower today"
    commands:
      - assertVisible: "No flower today"
      - assertVisible: "Try again"
      # Retry triggers a re-fetch
      - tapOn: "Try again"
      - extendedWaitUntil:
          anyOf:
            - visible: "← Yesterday"
            - visible: "No flower today"
          timeout: 15000
