# Shared connection flow with auto-recovery for Expo Go discovery issues
appId: host.exp.Exponent
---
- launchApp

# Dismiss any first-run onboarding or notification popups in Expo Go
- tapOn:
    text: "Got it"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "OK"
    optional: true

# Check if the local dev server is auto-discovered on screen.
# If it is not visible, recover by opening the Expo deep link directly.
- runFlow:
    when:
      notVisible: "http://localhost:8081"
    commands:
      - openLink: "exp://localhost:8081"

- runFlow:
    when:
      visible: "http://localhost:8081"
    commands:
      - tapOn: "http://localhost:8081"

# Dismiss any local network permission prompts, system dialogs, or Expo warnings
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Got it"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
