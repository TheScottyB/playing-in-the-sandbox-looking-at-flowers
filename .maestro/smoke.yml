# Smoke test: app launches and the daily flower screen resolves.
#
# App IDs:
#   Expo Go (iOS)    [local dev]: host.exp.Exponent      <- used below
#   Expo Go (Android)[local dev]: host.exp.exponent
#   Dev client (iOS) [CI/prod]:   com.djscottyb.playinginthesandoxlookingatflowers
#
# Prerequisites:
#   - Run `npx expo start --ios` to boot simulator + install Expo Go
#   - Then: maestro test .maestro/smoke.yml
appId: host.exp.Exponent
---
- launchApp
# Expo Go opens its home screen — tap the dev server entry to enter our app
- tapOn: "http://localhost:8081"
# Wait up to 20 s for the spinner to clear and the screen to resolve.
# Success: flower loads and "← Yesterday" nav button is visible.
# 404:     "Coming soon to your area" (no flower published yet for this date).
# Service: "The flower service is having trouble"
# Network: "Couldn't reach the flower service"
- extendedWaitUntil:
    visible: "← Yesterday"
    timeout: 20000
- assertVisible: "← Yesterday"
