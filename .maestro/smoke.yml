# Smoke test: app launches and the daily flower screen resolves.
#
# App IDs:
#   Expo Go (iOS)    [local dev]: host.exp.Exponent
#   Expo Go (Android)[local dev]: host.exp.exponent
#   Dev client (iOS) [CI/prod]:   com.djscottyb.playinginthesandoxlookingatflowers
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"

# Wait for the screen to resolve — either flower loads, fallback shows,
# or an error state appears. Any of these means the app booted correctly.
- extendedWaitUntil:
    anyOf:
      - visible: "← Yesterday"
      - visible: "TAP TO READ"
      - visible: "Coming soon to your area"
      - visible: "The flower service is having trouble"
    timeout: 20000

# If the flower or fallback loaded, verify nav is present
- runFlow:
    when:
      visible: "← Yesterday"
    commands:
      - assertVisible: "← Yesterday"
