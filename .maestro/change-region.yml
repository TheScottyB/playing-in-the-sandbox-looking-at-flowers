# Change region: tapping the link clears the cached state, re-prompts (or
# silently re-resolves if permission is already granted), and returns the
# user to today's flower for their region.
#
# Asserts on:
#   1. The link is reachable from the flower card meta row
#   2. Tapping it triggers a re-fetch (loading → success round-trip)
#   3. dayOffset is reset to 0 — if we were on yesterday before the tap,
#      we're back on today after (no "Today →" button)
#
# Local dev (Expo Go): host.exp.Exponent
# CI/prod (dev client): com.djscottyb.playinginthesandoxlookingatflowers
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"

# Wait for the daily flower to load
- extendedWaitUntil:
    visible: "← Yesterday"
    timeout: 20000
- assertVisible: "← Yesterday"
- assertVisible: "Change region"

# Navigate one day back so we can verify the offset reset later
- tapOn: "← Yesterday"
- extendedWaitUntil:
    visible: "Today →"
    timeout: 10000
- assertVisible: "Today →"

# Tap the meta-row link. This calls resetRegion() + setDayOffset(0) + bumps
# the reloadKey, so we expect a re-fetch and a return to today.
- tapOn: "Change region"

# After re-resolution, "← Yesterday" comes back and "Today →" is gone
# (dayOffset has been reset to 0).
- extendedWaitUntil:
    visible: "← Yesterday"
    timeout: 20000
- assertVisible: "← Yesterday"
- assertNotVisible: "Today →"
- assertVisible: "Change region"
