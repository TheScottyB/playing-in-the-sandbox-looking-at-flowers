# Date navigation: tap Yesterday then Today to verify date browsing works.
# Requires network access to GitHub Pages daily flower data.
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"

# Wait for flower to load
- extendedWaitUntil:
    visible: "← Yesterday"
    timeout: 20000
- assertVisible: "← Yesterday"

# Navigate to yesterday
- tapOn: "← Yesterday"
- extendedWaitUntil:
    visible: "Today →"
    timeout: 10000
- assertVisible: "Today →"
- assertVisible: "← Yesterday"

# Navigate back to today
- tapOn: "Today →"
- extendedWaitUntil:
    notVisible: "Today →"
    timeout: 10000
- assertVisible: "← Yesterday"
