# Date navigation: tap Yesterday then Today to verify date browsing works.
# Requires network access to GitHub Pages daily flower data.
# Local dev (Expo Go): host.exp.Exponent
# CI/prod (dev client): com.djscottyb.playinginthesandoxlookingatflowers
appId: host.exp.Exponent
---
- launchApp
- tapOn: "http://localhost:8081"
# Wait for the flower to load (up to 20s for network fetch)
- extendedWaitUntil:
    visible: "← Yesterday"
    timeout: 20000
- assertVisible: "← Yesterday"

# Navigate to yesterday
- tapOn: "← Yesterday"
# Yesterday's flower loads and "Today →" button appears
- extendedWaitUntil:
    visible: "Today →"
    timeout: 10000
- assertVisible: "Today →"
- assertVisible: "← Yesterday"

# Navigate back to today
- tapOn: "Today →"
# "Today →" disappears when back on current date
- extendedWaitUntil:
    notVisible: "Today →"
    timeout: 10000
- assertVisible: "← Yesterday"
