# Navigation: visit every tab and assert key content on each screen.
# Local dev (Expo Go): host.exp.Exponent
# CI/prod (dev client): com.djscottyb.playinginthesandoxlookingatflowers
appId: host.exp.Exponent
---
- launchApp
# Navigate from Expo Go home into the app
- tapOn: "http://localhost:8081"
- extendedWaitUntil:
    visible: "Hello World!!"
    timeout: 15000

# --- Home tab (default) ---
- assertVisible: "Hello World!!"
- assertVisible: "Step 1: Try it"

# --- Explore tab ---
- tapOn: "Explore"
- assertVisible: "Explore"
- assertVisible: "This app includes example code to help you get started."
- assertVisible: "File-based routing"
- assertVisible: "Android, iOS, and web support"
- assertVisible: "Animations"

# --- Cards tab ---
- tapOn: "Cards"
- assertVisible: "First Card"
- assertVisible: "Second Card"
- assertVisible: "Third Card"

# --- Flowers tab ---
- tapOn: "Flowers"
- assertVisible: "Flower Gallery"
- assertVisible: "Flip through our beautiful flower collection"
- assertVisible: "All"
- assertVisible: "Spring"
- assertVisible: "Summer"
- assertVisible: "Fall"
- assertVisible: "Winter"

# --- Return to Home ---
- tapOn: "Home"
- assertVisible: "Hello World!!"
